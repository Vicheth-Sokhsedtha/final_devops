services:

  web:
    build: .
    container_name: web-server

    ports:
      - "8443:8060"
      - "2222:22"

    depends_on:
      - mysql

  mysql:
    image: mysql:8

    container_name: mysql-db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: Hello@123
      MYSQL_DATABASE: B-Vicheth_Sokhsedtha-db

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: