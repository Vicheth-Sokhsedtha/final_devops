<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Templates - ID Card System')}"></head>
<body>

<nav th:replace="~{fragments/header :: navbar('templates')}"></nav>

<div class="container">
    <div class="page-header">
        <div>
            <h1>ID Card Templates</h1>
            <p class="subtitle">Customize the look and feel of your ID cards</p>
        </div>
        <a href="/web/templates/create" class="btn btn-primary">+ New Template</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}">Success</div>

    <div class="grid-3" th:if="${not #lists.isEmpty(templates)}">
        <div class="card" th:each="template : ${templates}">
            <div class="card-body">
                <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px;">
                    <div>
                        <h3 th:text="${template.name}" style="margin-bottom: 4px;">Template Name</h3>
                        <span class="badge badge-student" th:text="${template.code}">DEFAULT</span>
                    </div>
                </div>

                <div style="margin-bottom: 16px;">
                    <strong style="font-size: 14px; color: var(--text-light);">Organization:</strong>
                    <span style="font-size: 14px; margin-left: 6px;" th:text="${template.organizationName}">Org Name</span>
                </div>

                <div th:if="${template.tagline}" style="margin-bottom: 16px;">
                    <strong style="font-size: 14px; color: var(--text-light);">Tagline:</strong>
                    <span style="font-size: 14px; margin-left: 6px;" th:text="${template.tagline}">Tagline</span>
                </div>

                <div style="display: flex; gap: 16px; margin-bottom: 16px;">
                    <div>
                        <strong style="font-size: 12px; color: var(--text-light);">Primary</strong>
                        <div class="color-preview" th:style="'background: ' + ${template.primaryColor}"></div>
                    </div>
                    <div>
                        <strong style="font-size: 12px; color: var(--text-light);">Secondary</strong>
                        <div class="color-preview" th:style="'background: ' + ${template.secondaryColor}"></div>
                    </div>
                    <div th:if="${template.textColor}">
                        <strong style="font-size: 12px; color: var(--text-light);">Text</strong>
                        <div class="color-preview" th:style="'background: ' + ${template.textColor}"></div>
                    </div>
                </div>

                <div style="display: flex; gap: 8px;">
                    <a th:href="@{'/web/templates/edit/' + ${template.id}}" class="btn btn-warning btn-sm">Edit</a>
                    <form method="post" th:action="@{'/web/templates/delete/' + ${template.id}}" style="display:inline;" onsubmit="return confirm('Delete this template?')">
                        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="empty-state" th:if="${#lists.isEmpty(templates)}">
        <div class="icon">🎨</div>
        <h3>No templates yet</h3>
        <p>Create a template to customize your ID card colors and organization info.</p>
        <a href="/web/templates/create" class="btn btn-primary">Create Template</a>
    </div>
</div>

</body>
</html>
</write_to_file>
