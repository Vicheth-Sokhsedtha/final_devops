<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ID Card - <span th:text="${profile.fullName}">Name</span></title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
               background: #f0f2f5; display: flex; justify-content: center;
               align-items: center; min-height: 100vh; padding: 20px; }
        .id-card {
            width: 340px; border-radius: 16px; overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            background: #fff;
            border: 1px solid rgba(0,0,0,0.08);
        }
        .card-header {
            padding: 24px 20px 16px;
            text-align: center;
            color: #fff;
            background: linear-gradient(135deg, var(--primary, #1d4ed8), var(--primary-dark, #1e40af));
        }
        .card-header .org-name {
            font-size: 16px; font-weight: 700; letter-spacing: 0.5px;
            margin-bottom: 2px;
        }
        .card-header .tagline {
            font-size: 11px; opacity: 0.85;
        }
        .card-body {
            padding: 20px;
        }
        .photo-section {
            display: flex; align-items: center; gap: 16px;
            margin-bottom: 16px;
        }
        .photo {
            width: 80px; height: 80px; border-radius: 50%;
            object-fit: cover; border: 3px solid var(--secondary, #e0e7ff);
            background: #e5e7eb; flex-shrink: 0;
        }
        .photo-placeholder {
            width: 80px; height: 80px; border-radius: 50%;
            background: var(--secondary, #e0e7ff);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 700; color: var(--primary, #1d4ed8);
            flex-shrink: 0;
        }
        .name-section h2 {
            font-size: 18px; color: #111827; margin-bottom: 2px;
        }
        .name-section .title-text {
            font-size: 13px; color: #6b7280;
        }
        .details {
            display: flex; flex-direction: column; gap: 8px;
        }
        .detail-row {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; color: #374151;
        }
        .detail-row .label {
            min-width: 70px; font-weight: 600; color: #6b7280;
        }
        .detail-row .value {
            color: #111827;
        }
        .qr-section {
            display: flex; justify-content: center; margin: 12px 0;
        }
        .qr-section img {
            width: 80px; height: 80px;
        }
        .barcode-section {
            display: flex; justify-content: center; margin-top: 8px;
        }
        .barcode-section img {
            max-width: 100%; height: 40px;
        }
        .card-footer {
            padding: 12px 20px;
            background: var(--secondary, #e0e7ff);
            display: flex; justify-content: space-between;
            font-size: 11px; color: #6b7280;
        }
    </style>
</head>
<body>

<div class="id-card" th:style="'--primary: ' + (${template != null} ? ${template.primaryColor} : '#1d4ed8') + '; --primary-dark: #1e40af; --secondary: ' + (${template != null} ? ${template.secondaryColor} : '#e0e7ff') + ';'">

    <!-- Header -->
    <div class="card-header">
        <div class="org-name" th:text="${template != null ? template.organizationName : 'Organization'}">Organization</div>
        <div class="tagline" th:text="${template != null ? template.tagline : ''}">Tagline</div>
    </div>

    <!-- Body -->
    <div class="card-body">
        <!-- Photo + Name -->
        <div class="photo-section">
            <img th:if="${profile.hasPhoto()}" class="photo"
                 th:src="@{'/profiles/' + ${profile.id} + '/photo'}"
                 alt="Photo"/>
            <div th:unless="${profile.hasPhoto()}" class="photo-placeholder">
                <span th:text="${#strings.substring(profile.fullName, 0, 1)}">A</span>
            </div>
            <div class="name-section">
                <h2 th:text="${profile.fullName}">Full Name</h2>
                <div class="title-text" th:text="${profile.title}">Title</div>
            </div>
        </div>

        <!-- Details -->
        <div class="details">
            <div class="detail-row">
                <span class="label">Reg No.</span>
                <span class="value" th:text="${profile.registrationNumber}">REG-001</span>
            </div>
            <div class="detail-row" th:if="${profile.department != null and !profile.department.isEmpty()}">
                <span class="label">Dept.</span>
                <span class="value" th:text="${profile.department}">Department</span>
            </div>
            <div class="detail-row" th:if="${profile.email != null and !profile.email.isEmpty()}">
                <span class="label">Email</span>
                <span class="value" th:text="${profile.email}">email@example.com</span>
            </div>
            <div class="detail-row" th:if="${profile.phone != null and !profile.phone.isEmpty()}">
                <span class="label">Phone</span>
                <span class="value" th:text="${profile.phone}">+855 12 345 678</span>
            </div>
            <div class="detail-row" th:if="${profile.bloodGroup != null and !profile.bloodGroup.isEmpty()}">
                <span class="label">Blood</span>
                <span class="value" th:text="${profile.bloodGroup}">O+</span>
            </div>
            <div class="detail-row">
                <span class="label">Type</span>
                <span class="value" th:text="${profile.type}">STUDENT</span>
            </div>
            <div class="detail-row">
                <span class="label">Issue</span>
                <span class="value" th:text="${#temporals.format(profile.issueDate, 'dd MMM yyyy')}">01 Jan 2026</span>
            </div>
            <div class="detail-row">
                <span class="label">Expiry</span>
                <span class="value" th:text="${#temporals.format(profile.expiryDate, 'dd MMM yyyy')}">01 Jan 2029</span>
            </div>
        </div>

        <!-- QR Code -->
        <div class="qr-section" th:if="${qrCodeDataUri != null}">
            <img th:src="${qrCodeDataUri}" alt="QR Code"/>
        </div>

        <!-- Barcode -->
        <div class="barcode-section" th:if="${barcodeDataUri != null}">
            <img th:src="${barcodeDataUri}" alt="Barcode"/>
        </div>
    </div>

    <!-- Footer -->
    <div class="card-footer">
        <span>ID: <span th:text="${profile.uuid.substring(0,8)}">abcd1234</span></span>
        <span th:text="${#temporals.format(profile.createdAt, 'yyyy-MM-dd')}">2026-01-01</span>
    </div>
</div>

</body>
</html>
